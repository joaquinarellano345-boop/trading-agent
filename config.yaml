    app_status: "submitted"
  leverage: 500
  comisiones:
    tipo: "raw_pricing"
    comision_por_lote_redondo: 3.5

# Configuración del bot
bot:
  capital_inicial: 200.0
  capital_objetivo: 1000.0
  timeframe_principal: "M15"
  modo: "demo_real"  # demo_real | simulado | real
  max_riesgo_por_operacion: 0.02
  max_drawdown_diario: 0.10
  max_drawdown_total: 0.30
  spread_max_pips: 1.5

# Estrategias — solo las que pasaron el backtest
# Basado en 30 días de datos reales Yahoo Finance (5m)
estrategias:
  - nombre: "trend_following_ema"
    activa: true
    timeframe: "M15"
    params:
      ema_rapida: 9
      ema_lenta: 21
      take_profit_pips: 35
      stop_loss_pips: 15
      trailing_stop: true
    pares:
      - NZDUSD  # Backtest: +$55.35, WR 43.8%, PF 1.64

  - nombre: "breakout_bb"
    activa: true
    timeframe: "M15"
    params:
      bb_periodo: 20
      bb_desviacion: 2.0
      take_profit_pips: 30
      stop_loss_pips: 12
    pares:
      - EURUSD  # Backtest: +$62.51, WR 38.6%, PF 1.39
      - GBPUSD  # Backtest: +$17.80, WR 33.3%, PF 1.07

  - nombre: "scalping_rsi"
    activa: false  # DESACTIVADO: WR < 35% en backtest, spreads te comen
    timeframe: "M1"
    params:
      rsi_periodo: 14
      rsi_sobrecompra: 70
      rsi_sobreventa: 30
      take_profit_pips: 15
      stop_loss_pips: 8

# Adaptive Risk Manager v7
risk_manager_v7:
  habilitado: true
  base_risk_pct: 0.02
  max_risk_pct: 0.04
  min_risk_pct: 0.01
  daily_max_loss_pct: 0.10  # 10% de capital = stop diario
  daily_max_trades: 12
  max_drawdown_hard_limit: 0.30
  trading_sessions:
    enabled: true
    sessions:
      - "london_ny_overlap"  # 1pm-4pm UTC — la mejor ventana
      - "london"             # 7am-4pm UTC
      - "new_york"           # 1pm-10pm UTC

# Análisis técnico
analisis_tecnico:
  indicadores:
    - rsi: {periodo: 14, sobrecompra: 70, sobreventa: 30}
    - macd: {rapida: 12, lenta: 26, señal: 9}
    - bb: {periodo: 20, desviacion: 2.0}
    - ema: {periodos: [9, 21, 50, 200]}

# Dashboard
dashboard:
  puerto: 8765
  host: "0.0.0.0"
  actualizacion_seg: 5

# Sistema de aprendizaje
aprendizaje:
  habilitado: true
  historial_max: 1000
  mejora_estrategica: true
  evaluar_cada: 30
  ajustar_riesgo: true

# Símbolos — solo forex principales (índices y futuros necesitan sizing específico)
simbolos:
  forex:
    - EURUSD
    - GBPUSD
    - NZDUSD
