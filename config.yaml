# Configuración del bot
bot:
  capital_inicial: 200.0
  capital_objetivo: 1000.0
  timeframe_principal: "M5"
  modo: "demo_real"  # demo_real (datos reales Yahoo Finance, sin ejecución real) | simulado | real
  max_operaciones_dia: 10
  max_riesgo_por_operacion: 0.02
  max_drawdown_diario: 0.50
  max_drawdown_total: 0.70
  spread_max_pips: 1.5
  slippage_pips: 1

# Estrategias
estrategias:
  - nombre: "scalping_rsi"
    activa: true
    timeframe: "M1"
    params:
      rsi_periodo: 14
      rsi_sobrecompra: 70
      rsi_sobreventa: 30
      take_profit_pips: 10
      stop_loss_pips: 5
  - nombre: "trend_following_ema"
    activa: true
    timeframe: "M15"
    params:
      ema_rapida: 9
      ema_lenta: 21
      take_profit_pips: 30
      stop_loss_pips: 15
      trailing_stop: true
  - nombre: "breakout_bb"
    activa: true
    timeframe: "M15"
    params:
      bb_periodo: 20
      bb_desviacion: 2.0
      take_profit_pips: 25
      stop_loss_pips: 12

# Análisis técnico
analisis_tecnico:
  indicadores:
    - rsi: {periodo: 14, sobrecompra: 70, sobreventa: 30}
    - macd: {rapida: 12, lenta: 26, señal: 9}
    - bb: {periodo: 20, desviacion: 2.0}
    - ema: {periodos: [9, 21, 50, 200]}
    - atr: {periodo: 14}

# Dashboard
dashboard:
  puerto: 8765
  host: "0.0.0.0"
  actualizacion_seg: 5
  template: "dashboard.html"

# Sistema de aprendizaje
aprendizaje:
  habilitado: true
  historial_max: 1000
  mejora_estrategica: true
  evaluar_cada: 50
  ajustar_riesgo: true

